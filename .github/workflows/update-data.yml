name: Update Station Data

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"

    - name: Save current data for comparison
      run: |
        cp data/stations_summary.md /tmp/old_summary.md 2>/dev/null || touch /tmp/old_summary.md
        cp data/stations.csv /tmp/old_stations.csv 2>/dev/null || touch /tmp/old_stations.csv

    - name: Fetch station abbreviations
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 5
        max_attempts: 3
        retry_wait_seconds: 30
        command: uv run scripts/fetch_abbreviations.py
    
    - name: Fetch current station data
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 5
        max_attempts: 3
        retry_wait_seconds: 30
        command: uv run scripts/fetch_stations.py

    - name: Fetch network maps
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 5
        max_attempts: 3
        retry_wait_seconds: 30
        command: uv run scripts/fetch_network_maps.py

    - name: Check for changes
      id: check_changes
      run: |
        git add data/*
        git diff --staged --quiet || echo "changes=true" >> $GITHUB_OUTPUT

    - name: Generate commit message
      if: steps.check_changes.outputs.changes == 'true'
      id: commit_message
      run: |
        MSG=$(python3 scripts/generate_commit_message.py /tmp/old_summary.md data/stations_summary.md /tmp/old_stations.csv data/stations.csv)
        echo "msg=$MSG" >> $GITHUB_OUTPUT

    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      env:
        COMMIT_MSG: ${{ steps.commit_message.outputs.msg }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git commit -m "$COMMIT_MSG"
        git push
